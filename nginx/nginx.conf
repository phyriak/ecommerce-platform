events {
    worker_connections 4096;
}

http {

    upstream payment_service {
        server payment-service:8082;
    }

    limit_req_zone $binary_remote_addr zone=payment_rate:10m rate=100r/s;
    limit_conn_zone $binary_remote_addr zone=payment_conn:10m;

    server {

        listen 80;

        location / {

            limit_req zone=payment_rate burst=50 nodelay;
            limit_conn payment_conn 20;

            proxy_pass http://payment_service;

            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}