global:
  scrape_interval: 5s

scrape_configs:

  - job_name: 'payment-service'

    metrics_path: '/actuator/prometheus'

    static_configs:
      - targets:
          - payment-service:8082

  - job_name: 'notification-service'

    metrics_path: '/actuator/prometheus'

    static_configs:
      - targets:
          - notification-service:8089